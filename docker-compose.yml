# Kerpta — Docker Compose (dev & prod)
# Usage dev  : docker compose up --build
# Usage prod : POSTGRES_PASSWORD=xxx docker compose up -d
#
# Variables obligatoires en prod (via .env ou install.sh) :
#   SECRET_KEY, POSTGRES_PASSWORD, SUPABASE_JWT_SECRET

services:

  # ── Base de données ─────────────────────────────────────────────────────────
  postgres:
    container_name: kerpta-postgres
    image: postgres:alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-kerpta}
      POSTGRES_USER:     postgres          # superuser par défaut — exigé par GoTrue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kerpta_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Queue ───────────────────────────────────────────────────────────
  redis:
    container_name: kerpta-redis
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Supabase Auth (GoTrue) ──────────────────────────────────────────────────
  supabase-auth:
    container_name: kerpta-auth
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      GOTRUE_DB_DRIVER:        postgres
      GOTRUE_DB_DATABASE_URL:  postgresql://postgres:${POSTGRES_PASSWORD:-kerpta_dev}@postgres:5432/${POSTGRES_DB:-kerpta}
      GOTRUE_SITE_URL:         ${APP_BASE_URL:-http://localhost:3000}
      API_EXTERNAL_URL:        ${AUTH_BASE_URL:-http://localhost:9999}
      GOTRUE_API_EXTERNAL_URL: ${AUTH_BASE_URL:-http://localhost:9999}
      GOTRUE_JWT_SECRET:       ${SUPABASE_JWT_SECRET:-changeme_dev_only_32chars_minimum}
      # Restreint les redirects OAuth à notre domaine uniquement
      GOTRUE_URI_ALLOW_LIST:   ${APP_BASE_URL:-http://localhost:3000}/**
      # false = nouveaux utilisateurs autorisés via OAuth
      # L'autorisation fine (qui a accès à quoi) est gérée par Kerpta côté app
      GOTRUE_DISABLE_SIGNUP:   "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      PORT: "9999"
    ports:
      - "9999:9999"
    depends_on:
      postgres:
        condition: service_healthy

  # ── API FastAPI ─────────────────────────────────────────────────────────────
  api:
    container_name: kerpta-api
    image: kerpta/api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL:          postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-kerpta_dev}@postgres:5432/${POSTGRES_DB:-kerpta}
      REDIS_URL:             redis://redis:6379/0
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY:            ${SECRET_KEY:-changeme_dev_only}
      DEBUG:                 ${DEBUG:-true}
      SUPABASE_JWT_SECRET:   ${SUPABASE_JWT_SECRET:-}
      APP_BASE_URL:          ${APP_BASE_URL:-http://localhost:3000}
      AUTH_BASE_URL:         ${AUTH_BASE_URL:-http://localhost:9999}
      # Pré-remplissage du wizard /setup/dbb
      POSTGRES_HOST:         postgres
      POSTGRES_PORT:         "5432"
      POSTGRES_DB:           ${POSTGRES_DB:-kerpta}
      POSTGRES_USER:         postgres
      POSTGRES_PASSWORD:     ${POSTGRES_PASSWORD:-kerpta_dev}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app     # hot-reload en dev ; retirez en prod
      - .env:/app/.env:rw  # le wizard écrit dans .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Worker Celery ───────────────────────────────────────────────────────────
  worker:
    container_name: kerpta-worker
    image: kerpta/worker
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL:          postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-kerpta_dev}@postgres:5432/${POSTGRES_DB:-kerpta}
      REDIS_URL:             redis://redis:6379/0
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY:            ${SECRET_KEY:-changeme_dev_only}
    volumes:
      - ./backend:/app
    depends_on:
      - api
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    container_name: kerpta-frontend
    image: kerpta/frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── DocuSeal — signature électronique (optionnel) ───────────────────────────

  #     DATABASE_URL:    ${DATABASE_URL}
  #     SECRET_KEY_BASE: ${DOCUSEAL_SECRET_KEY}
  #   ports:
  #     - "3001:3000"

volumes:
  postgres_data:
  redis_data:

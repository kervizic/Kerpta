<!DOCTYPE html>
<html lang="fr" class="bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Installation — Kerpta</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kerpta: {
              50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa',
              300: '#fdba74', 400: '#fb923c', 500: '#f97316',
              600: '#ea580c', 700: '#c2410c', 900: '#7c2d12',
            }
          }
        }
      }
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>

<body class="min-h-screen flex flex-col items-center justify-start pt-10 px-4 pb-12">

  <!-- Logo -->
  <div class="mb-6 text-center">
    <div class="inline-flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-kerpta-600 flex items-center justify-center shadow">
        <span class="text-white font-bold text-xl">K</span>
      </div>
      <span class="text-2xl font-bold text-slate-800 tracking-tight">Kerpta</span>
    </div>
    <p class="mt-1 text-sm text-slate-500">Assistant d'installation</p>
  </div>

  <!-- Données OAuth injectées côté serveur (JSON) -->
  <script id="saved-oauth" type="application/json">{{ saved_oauth_json | safe }}</script>
  <!-- URL auth injectée séparément pour éviter les conflits de guillemets dans x-data -->
  <script>window._kerptaAuthUrl = {{ prefill.auth_base_url | tojson }};</script>

  <!-- Carte principale -->
  <div
    class="w-full max-w-3xl bg-white rounded-2xl shadow-lg border border-slate-100"
    x-data="setupWizard('{{ tab }}', {{ setup_step }}, {{ 'true' if db_reachable else 'false' }})"
    x-init="init()"
  >

    <!-- Barre d'onglets -->
    <div class="flex border-b border-slate-200 px-6 pt-5 gap-1">

      <!-- Onglet 1 — Base de données -->
      <button
        type="button"
        @click="go('bdd')"
        class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-t-lg -mb-px border transition"
        :class="tab === 'bdd'
          ? 'border-slate-200 border-b-white bg-white text-kerpta-700 z-10'
          : 'border-transparent text-slate-500 hover:text-slate-700'"
      >
        <span
          class="inline-flex w-5 h-5 text-xs items-center justify-center rounded-full transition"
          :class="step > 1
            ? 'bg-green-100 text-green-600'
            : tab === 'bdd' ? 'bg-kerpta-600 text-white' : 'bg-slate-200 text-slate-500'"
        >
          <svg x-show="step > 1" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
          <span x-show="step <= 1">1</span>
        </span>
        Base de données
      </button>

      <!-- Onglet 2 — OAuth -->
      <button
        type="button"
        @click="go('oauth')"
        :disabled="step < 2"
        class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-t-lg -mb-px border transition"
        :class="tab === 'oauth'
          ? 'border-slate-200 border-b-white bg-white text-kerpta-700 z-10'
          : step >= 2 ? 'border-transparent text-slate-500 hover:text-slate-700' : 'border-transparent text-slate-300 cursor-not-allowed'"
      >
        <span
          class="inline-flex w-5 h-5 text-xs items-center justify-center rounded-full transition"
          :class="step > 2
            ? 'bg-green-100 text-green-600'
            : tab === 'oauth' ? 'bg-kerpta-600 text-white'
            : step >= 2 ? 'bg-slate-200 text-slate-500' : 'bg-slate-100 text-slate-300'"
        >
          <svg x-show="step > 2" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
          <span x-show="step <= 2">2</span>
        </span>
        OAuth
        <svg x-show="step < 2" x-cloak class="w-3 h-3 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </button>

      <!-- Onglet 3 — Administrateur -->
      <button
        type="button"
        @click="go('admin')"
        :disabled="step < 3"
        class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-t-lg -mb-px border transition"
        :class="tab === 'admin'
          ? 'border-slate-200 border-b-white bg-white text-kerpta-700 z-10'
          : step >= 3 ? 'border-transparent text-slate-500 hover:text-slate-700' : 'border-transparent text-slate-300 cursor-not-allowed'"
      >
        <span
          class="inline-flex w-5 h-5 text-xs items-center justify-center rounded-full transition"
          :class="tab === 'admin' ? 'bg-kerpta-600 text-white'
            : step >= 3 ? 'bg-slate-200 text-slate-500' : 'bg-slate-100 text-slate-300'"
        >3</span>
        Administrateur
        <svg x-show="step < 3" x-cloak class="w-3 h-3 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </button>
    </div><!-- /onglets -->


    <!-- ═══════════════════════════════════════════════════════════════════════
         PANNEAU 1 — BASE DE DONNÉES
    ════════════════════════════════════════════════════════════════════════ -->
    <div x-show="tab === 'bdd'" class="px-8 py-8">

      <h2 class="text-lg font-bold text-slate-900 mb-1">Base de données PostgreSQL</h2>
      <p class="text-sm text-slate-500 mb-6">
        Renseignez les paramètres de connexion. Ils seront stockés dans le fichier <code class="font-mono text-xs bg-slate-100 px-1 rounded">.env</code>.
      </p>

      {% if bdd_error %}
      <div class="mb-5 flex items-start gap-3 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        <svg class="mt-0.5 w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
        <span>{{ bdd_error }}</span>
      </div>
      {% endif %}

      <form
        method="post"
        action="/setup/dbb"
        x-data="bddForm()"
      >
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

          <div class="sm:col-span-2 grid grid-cols-3 gap-3">
            <div class="col-span-2">
              <label class="block text-xs font-medium text-slate-600 mb-1.5" for="db_host">Hôte</label>
              <input id="db_host" name="db_host" type="text" required
                value="{{ prefill.db_host }}"
                placeholder="localhost"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                       focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1.5" for="db_port">Port</label>
              <input id="db_port" name="db_port" type="number" required
                value="{{ prefill.db_port }}"
                placeholder="5432"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                       focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1.5" for="db_name">Nom de la base</label>
            <input id="db_name" name="db_name" type="text" required
              value="{{ prefill.db_name }}"
              placeholder="kerpta"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1.5" for="db_user">Utilisateur</label>
            <input id="db_user" name="db_user" type="text" required
              value="{{ prefill.db_user }}"
              placeholder="kerpta"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
          </div>

          <div class="sm:col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1.5" for="db_password">Mot de passe</label>
            <input id="db_password" name="db_password" type="password"
              value="{{ prefill.db_password }}"
              autocomplete="off"
              placeholder="••••••••••••"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
          </div>

        </div>

        <!-- Bouton Tester -->
        <div class="mt-4 flex items-center gap-3">
          <button
            type="button"
            @click="testConnection()"
            :disabled="testing"
            class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition disabled:opacity-50"
          >
            <svg x-show="!testing" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <svg x-show="testing" x-cloak class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span x-text="testing ? 'Test en cours…' : 'Tester la connexion'"></span>
          </button>

          <span x-show="testResult === 'ok'" x-cloak class="text-sm text-green-600 font-medium flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
            </svg>
            Connexion réussie
          </span>
          <span x-show="testResult === 'error'" x-cloak class="text-sm text-red-600 flex items-center gap-1.5">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
            </svg>
            <span x-text="testError"></span>
          </span>
        </div>

        <div class="mt-6 flex justify-end">
          <button
            type="submit"
            class="inline-flex items-center gap-2 rounded-lg bg-kerpta-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-kerpta-700 shadow-sm transition"
          >
            Enregistrer et continuer
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </button>
        </div>
      </form>
    </div>


    <!-- ═══════════════════════════════════════════════════════════════════════
         PANNEAU 2 — OAUTH
    ════════════════════════════════════════════════════════════════════════ -->
    <div x-show="tab === 'oauth'" x-cloak class="px-8 py-8">

      <!-- Onglet désactivé -->
      <template x-if="step < 2">
        <div class="flex flex-col items-center justify-center py-12 text-center">
          <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center mb-4">
            <svg class="w-7 h-7 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
          </div>
          <p class="text-slate-500 font-medium mb-1">Configuration OAuth verrouillée</p>
          <p class="text-sm text-slate-400">Configurez d'abord la base de données (onglet 1).</p>
          <button type="button" @click="go('bdd')" class="mt-4 text-sm font-medium text-kerpta-600 hover:underline">
            ← Aller à l'onglet Base de données
          </button>
        </div>
      </template>

      <!-- Contenu si déverrouillé -->
      <template x-if="step >= 2">
        <div>
          <h2 class="text-lg font-bold text-slate-900 mb-1">Configuration OAuth</h2>
          <p class="text-sm text-slate-500 mb-6">
            Activez les fournisseurs d'authentification. Au moins un est requis pour créer le compte administrateur.
          </p>

          {% if oauth_error %}
          <div class="mb-5 flex items-start gap-3 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
            <svg class="mt-0.5 w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
            </svg>
            <span>{{ oauth_error }}</span>
          </div>
          {% endif %}

          <form method="post" action="/setup/oauth">

            <!-- URLs de l'instance -->
            <div class="mb-6 p-5 rounded-xl bg-slate-50 border border-slate-200">
              <h3 class="text-sm font-semibold text-slate-700 mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 text-kerpta-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/>
                </svg>
                URLs de l'instance
              </h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1.5" for="base_url">
                    URL publique de l'application
                  </label>
                  <input id="base_url" name="base_url" type="url" required
                    value="{{ prefill.app_base_url }}"
                    placeholder="https://kerpta.fr"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                  <p class="mt-1 text-xs text-slate-400">Sans slash final</p>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-600 mb-1.5" for="auth_url">
                    URL Supabase Auth (GoTrue)
                  </label>
                  <input id="auth_url" name="auth_url" type="url" required
                    x-model="authUrl"
                    value="{{ prefill.auth_base_url }}"
                    placeholder="https://auth.kerpta.fr"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                  <p class="mt-1 text-xs text-slate-400">URL de GoTrue / Supabase Auth</p>
                </div>
              </div>
            </div>

            <!-- Providers -->
            <h3 class="text-sm font-semibold text-slate-700 mb-3">Fournisseurs OAuth</h3>
            <div class="grid grid-cols-1 gap-3 mb-4">

              <!-- Providers connus -->
              {% set provider_icons = {
                "google":     '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>',
                "microsoft":  '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#00A4EF" d="M13 1h10v10H13z"/><path fill="#7FBA00" d="M1 13h10v10H1z"/><path fill="#FFB900" d="M13 13h10v10H13z"/></svg>',
                "apple":      '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>',
                "github":     '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>',
                "linkedin":   '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
                "facebook":   '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
                "twitter":    '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',

                "salesforce": '<svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="#00A1E0"><path d="M10.002 6.156c.72-.742 1.73-1.203 2.84-1.203 1.45 0 2.72.786 3.415 1.956.59-.26 1.24-.402 1.924-.402 2.67 0 4.832 2.163 4.832 4.832 0 2.67-2.163 4.831-4.832 4.831a4.8 4.8 0 01-1.236-.162c-.627 1.046-1.772 1.747-3.08 1.747-.56 0-1.092-.137-1.558-.38a3.825 3.825 0 01-3.573 2.47c-1.604 0-2.985-.98-3.567-2.38-.32.072-.65.11-.99.11C2.163 17.574 0 15.41 0 12.74c0-1.758.94-3.3 2.348-4.144a4.126 4.126 0 01-.215-1.313C2.133 4.934 4.068 3 6.457 3c1.453 0 2.742.717 3.545 1.817l-.001.339z"/></svg>',
              } %}

              {% set console_urls = {
                "google": "https://console.cloud.google.com/apis/credentials",
                "microsoft": "https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps/ApplicationsListBlade",
                "apple": "https://developer.apple.com/account/resources/identifiers/list/serviceId",
                "github": "https://github.com/settings/developers",
                "linkedin": "https://www.linkedin.com/developers/apps",
                "facebook": "https://developers.facebook.com/apps/",
                "twitter": "https://developer.twitter.com/en/portal/dashboard",
                "discord": "https://discord.com/developers/applications",
                "salesforce": "https://login.salesforce.com/setup/",
              } %}

              {% for key, label in providers.items() %}
              <div x-data="providerCard('{{ key }}')" class="rounded-xl border transition"
                :class="enabled ? 'border-kerpta-300 bg-kerpta-50' : 'border-slate-200 bg-white'">

                <!-- En-tête -->
                <div class="flex items-center justify-between px-4 py-3 cursor-pointer select-none"
                  @click="if(enabled) open = !open">
                  <div class="flex items-center gap-3">
                    {{ provider_icons[key] | safe }}
                    <span class="text-sm font-medium text-slate-800">{{ label }}</span>
                    <a href="{{ console_urls[key] }}" target="_blank" rel="noopener" @click.stop
                      class="text-slate-400 hover:text-kerpta-600 transition" title="Console {{ label }}">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
                      </svg>
                    </a>
                  </div>
                  <div class="flex items-center gap-3">
                    <span x-show="enabled" x-cloak class="text-xs font-medium text-kerpta-700 bg-kerpta-100 rounded-full px-2 py-0.5">Activé</span>
                    <button type="button" role="switch" :aria-checked="enabled.toString()"
                      @click.stop="enabled = !enabled; open = enabled"
                      class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent
                             transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:ring-offset-1"
                      :class="enabled ? 'bg-kerpta-600' : 'bg-slate-200'">
                      <span class="pointer-events-none inline-block h-4 w-4 rounded-full bg-white shadow transform transition duration-200"
                        :class="enabled ? 'translate-x-4' : 'translate-x-0'"></span>
                    </button>
                  </div>
                </div>

                <input type="hidden" name="{{ key }}_enabled" :value="enabled ? 'on' : 'off'" />

                <!-- Credentials -->
                <div x-cloak x-show="open && enabled"
                  x-transition:enter="transition ease-out duration-150"
                  x-transition:enter-start="opacity-0 -translate-y-1"
                  x-transition:enter-end="opacity-100 translate-y-0"
                  class="px-4 pb-4 border-t border-kerpta-100">
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                    <div>
                      <label class="block text-xs font-medium text-slate-600 mb-1" for="{{ key }}_client_id">Client ID</label>
                      <input id="{{ key }}_client_id" name="{{ key }}_client_id" type="text"
                        x-model="clientId"
                        placeholder="votre-client-id"
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                    </div>
                    <div>
                      <label class="block text-xs font-medium text-slate-600 mb-1" for="{{ key }}_client_secret">Client Secret</label>
                      <input id="{{ key }}_client_secret" name="{{ key }}_client_secret" type="password"
                        x-model="clientSecret"
                        :placeholder="hasSecret ? '🔒 Laisser vide pour conserver' : '••••••••••••'"
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                    </div>
                  </div>
                </div>
              </div>
              {% endfor %}

              <!-- OIDC personnalisé -->
              <div x-data="providerCard('custom_oidc')"
                class="rounded-xl border-2 border-dashed transition"
                :class="enabled ? 'border-kerpta-300 bg-kerpta-50' : 'border-slate-200 bg-white'">
                <div class="flex items-center justify-between px-4 py-3 cursor-pointer select-none"
                  @click="if(enabled) open = !open">
                  <div class="flex items-center gap-3">
                    <div class="w-5 h-5 rounded border-2 border-slate-400 flex items-center justify-center">
                      <svg class="w-3 h-3 text-slate-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                      </svg>
                    </div>
                    <div>
                      <span class="text-sm font-medium text-slate-800">Fournisseur OIDC personnalisé</span>
                      <p class="text-xs text-slate-500">Compatible OAuth 2.0 / OpenID Connect</p>
                    </div>
                  </div>
                  <button type="button" role="switch" :aria-checked="enabled.toString()"
                    @click.stop="enabled = !enabled; open = enabled"
                    class="relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent
                           transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:ring-offset-1"
                    :class="enabled ? 'bg-kerpta-600' : 'bg-slate-200'">
                    <span class="pointer-events-none inline-block h-4 w-4 rounded-full bg-white shadow transform transition duration-200"
                      :class="enabled ? 'translate-x-4' : 'translate-x-0'"></span>
                  </button>
                </div>
                <input type="hidden" name="custom_oidc_enabled" :value="enabled ? 'on' : 'off'" />
                <div x-cloak x-show="open && enabled" x-transition class="px-4 pb-4 border-t border-kerpta-100">
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                    <div>
                      <label class="block text-xs font-medium text-slate-600 mb-1" for="custom_oidc_client_id">Client ID</label>
                      <input id="custom_oidc_client_id" name="custom_oidc_client_id" type="text"
                        x-model="clientId" placeholder="votre-client-id"
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                    </div>
                    <div>
                      <label class="block text-xs font-medium text-slate-600 mb-1" for="custom_oidc_client_secret">Client Secret</label>
                      <input id="custom_oidc_client_secret" name="custom_oidc_client_secret" type="password"
                        :placeholder="hasSecret ? '🔒 Laisser vide pour conserver' : '••••••••••••'"
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                    </div>
                    <div class="sm:col-span-2">
                      <label class="block text-xs font-medium text-slate-600 mb-1" for="custom_oidc_issuer_url">Issuer URL</label>
                      <input id="custom_oidc_issuer_url" name="custom_oidc_issuer_url" type="url"
                        x-model="issuerUrl"
                        placeholder="https://sso.example.com/realms/master"
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-kerpta-500 focus:border-transparent transition"/>
                    </div>
                  </div>
                </div>
              </div>

            </div><!-- /providers -->

            <!-- Redirect URI info -->
            <div class="mt-4 rounded-lg bg-kerpta-50 border border-kerpta-200 px-4 py-3 text-xs text-kerpta-700">
              <p class="font-semibold mb-1">URL de callback à configurer dans chaque console :</p>
              <div class="flex items-center gap-2" x-data="{ copied: false }">
                <code class="flex-1 font-mono bg-kerpta-100 px-2 py-1.5 rounded text-kerpta-800 break-all"
                  x-text="(authUrl || '').replace(/\/+$/, '') + '/auth/v1/callback'"></code>
                <button type="button"
                  @click="navigator.clipboard.writeText((authUrl || '').replace(/\/+$/, '') + '/auth/v1/callback'); copied = true; setTimeout(() => copied = false, 2000)"
                  class="shrink-0 p-1.5 rounded-lg hover:bg-kerpta-200 transition" title="Copier">
                  <svg x-show="!copied" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                  <svg x-show="copied" x-cloak class="w-3.5 h-3.5 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Actions -->
            <div class="mt-6 flex justify-end">
              <button type="submit"
                class="inline-flex items-center gap-2 rounded-lg bg-kerpta-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-kerpta-700 shadow-sm transition">
                Enregistrer et continuer
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
              </button>
            </div>

          </form>
        </div>
      </template>
    </div>


    <!-- ═══════════════════════════════════════════════════════════════════════
         PANNEAU 3 — ADMINISTRATEUR
    ════════════════════════════════════════════════════════════════════════ -->
    <div x-show="tab === 'admin'" x-cloak class="px-8 py-8">

      <!-- Onglet désactivé -->
      <template x-if="step < 3">
        <div class="flex flex-col items-center justify-center py-12 text-center">
          <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center mb-4">
            <svg class="w-7 h-7 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
          </div>
          <p class="text-slate-500 font-medium mb-1">Création de l'administrateur verrouillée</p>
          <p class="text-sm text-slate-400">Configurez d'abord OAuth (onglet 2).</p>
          <button type="button" @click="go('oauth')" class="mt-4 text-sm font-medium text-kerpta-600 hover:underline">
            ← Aller à la configuration OAuth
          </button>
        </div>
      </template>

      <!-- Contenu si déverrouillé -->
      <template x-if="step >= 3">
        <div x-data="adminSetup('{{ auth_url }}', '{{ callback_url }}')" x-init="onInit()">

          <h2 class="text-lg font-bold text-slate-900 mb-1">Création de l'administrateur</h2>
          <p class="text-sm text-slate-500 mb-6">
            Connectez-vous avec un compte OAuth pour créer le premier administrateur de la plateforme.
          </p>

          <!-- État idle : boutons OAuth -->
          <div x-show="state === 'idle'">
            {% if enabled_providers %}
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {% for provider in enabled_providers %}
              <button type="button" @click="loginWith('{{ provider.key }}')"
                class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5
                       text-sm font-medium text-slate-800 hover:border-kerpta-400 hover:bg-kerpta-50 transition shadow-sm">
                {% if provider.key == 'google' %}
                  <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                {% elif provider.key == 'microsoft' %}
                  <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#00A4EF" d="M13 1h10v10H13z"/><path fill="#7FBA00" d="M1 13h10v10H1z"/><path fill="#FFB900" d="M13 13h10v10H13z"/></svg>
                {% elif provider.key == 'github' %}
                  <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
                {% else %}
                  <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
                {% endif %}
                <span>Continuer avec {{ provider.label }}</span>
              </button>
              {% endfor %}
            </div>
            {% else %}
            <div class="rounded-xl bg-amber-50 border border-amber-200 px-5 py-4 text-sm text-amber-800">
              <p class="font-semibold mb-1">⚠ Aucun fournisseur OAuth activé</p>
              <p>Retournez à l'onglet OAuth pour configurer au moins un fournisseur.</p>
              <button type="button" @click="go('oauth')" class="mt-3 text-kerpta-700 font-medium hover:underline">
                ← Configurer OAuth
              </button>
            </div>
            {% endif %}
          </div>

          <!-- État processing -->
          <div x-cloak x-show="state === 'processing'" class="py-10 text-center">
            <div class="inline-flex flex-col items-center gap-4">
              <svg class="w-10 h-10 text-kerpta-500 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              <p class="text-slate-600 font-medium" x-text="statusMsg">Connexion en cours…</p>
            </div>
          </div>

          <!-- État error -->
          <div x-cloak x-show="state === 'error'" class="rounded-xl bg-red-50 border border-red-200 px-5 py-4">
            <p class="text-sm font-semibold text-red-700 mb-1">Erreur lors de la connexion</p>
            <p class="text-sm text-red-600" x-text="errorMsg"></p>
            <button type="button" @click="state = 'idle'"
              class="mt-3 text-sm font-medium text-kerpta-700 hover:underline">Réessayer</button>
          </div>

          <!-- État success -->
          <div x-cloak x-show="state === 'success'" class="py-8 text-center">
            <div class="inline-flex flex-col items-center gap-4">
              <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                </svg>
              </div>
              <div>
                <p class="text-lg font-semibold text-slate-800">Installation terminée !</p>
                <p class="text-sm text-slate-500 mt-1">Redirection vers Kerpta…</p>
              </div>
            </div>
          </div>

        </div>
      </template>
    </div>

  </div><!-- /card -->

  <!-- Footer -->
  <p class="mt-8 text-xs text-slate-400">Kerpta — Logiciel de comptabilité libre (AGPL-3.0)</p>

</body>

<script>
// ── Données OAuth sauvegardées ─────────────────────────────────────────────
const savedOauth = JSON.parse(document.getElementById('saved-oauth').textContent || '{}')

// ── Wizard (onglets) ───────────────────────────────────────────────────────
function setupWizard(initialTab, setupStep, dbReachable) {
  return {
    tab: initialTab,
    step: setupStep,
    authUrl: window._kerptaAuthUrl || '',

    init() {
      // Si retour OAuth (hash #access_token), basculer sur l'onglet admin
      const hash = window.location.hash
      if (hash && (hash.includes('access_token') || hash.includes('error_description'))) {
        this.tab = 'admin'
      }
    },

    go(t) {
      if (!this.canGo(t)) return
      this.tab = t
      history.replaceState(null, '', window.location.pathname)
    },

    canGo(t) {
      if (t === 'bdd') return true
      if (t === 'oauth') return this.step >= 2
      if (t === 'admin') return this.step >= 3
      return false
    }
  }
}

// ── Formulaire BDD ─────────────────────────────────────────────────────────
function bddForm() {
  return {
    testing: false,
    testResult: null,
    testError: '',

    async testConnection() {
      this.testing = true
      this.testResult = null
      const form = this.$el.closest('form')
      const body = {
        host: form.db_host.value,
        port: parseInt(form.db_port.value) || 5432,
        database: form.db_name.value,
        user: form.db_user.value,
        password: form.db_password.value,
      }
      try {
        const r = await fetch('/setup/api/test-db', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        const data = await r.json()
        this.testResult = data.ok ? 'ok' : 'error'
        this.testError = data.error || ''
      } catch (e) {
        this.testResult = 'error'
        this.testError = e.toString()
      } finally {
        this.testing = false
      }
    }
  }
}

// ── Provider OAuth card ────────────────────────────────────────────────────
function providerCard(providerKey) {
  const cfg = savedOauth[providerKey] || {}
  return {
    enabled: !!cfg.enabled,
    open: !!cfg.enabled,
    clientId: cfg.client_id || '',
    clientSecret: '',
    hasSecret: !!(cfg.has_secret),
    issuerUrl: cfg.issuer_url || '',
  }
}

// ── Admin setup ────────────────────────────────────────────────────────────
function adminSetup(authUrl, callbackUrl) {
  return {
    state: 'idle',
    statusMsg: '',
    errorMsg: '',

    onInit() {
      const hash = window.location.hash
      if (hash && (hash.includes('access_token') || hash.includes('error'))) {
        this.handleCallback()
      }
    },

    loginWith(provider) {
      const redirectTo = encodeURIComponent(callbackUrl)
      const url = `${authUrl}/auth/v1/authorize?provider=${provider}&redirect_to=${redirectTo}`
      this.state = 'processing'
      this.statusMsg = 'Redirection vers le fournisseur OAuth…'
      window.location.href = url
    },

    async handleCallback() {
      const hash = window.location.hash
      this.state = 'processing'
      this.statusMsg = 'Finalisation du compte administrateur…'

      const params = new URLSearchParams(hash.substring(1))
      const accessToken = params.get('access_token')
      const errorDesc = params.get('error_description')

      if (errorDesc) {
        this.state = 'error'
        this.errorMsg = decodeURIComponent(errorDesc.replace(/\+/g, ' '))
        return
      }

      if (!accessToken) {
        this.state = 'error'
        this.errorMsg = 'Token d\'accès introuvable dans la réponse OAuth.'
        return
      }

      try {
        const res = await fetch('/setup/api/finalize', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`,
          },
        })
        const data = await res.json()
        if (data.ok) {
          this.state = 'success'
          history.replaceState(null, '', window.location.pathname)
          setTimeout(() => { window.location.href = data.redirect || '/' }, 1500)
        } else {
          this.state = 'error'
          this.errorMsg = data.error || 'Erreur inconnue lors de la finalisation.'
        }
      } catch (e) {
        this.state = 'error'
        this.errorMsg = e.toString()
      }
    },
  }
}

server {
    listen 3000;
    server_name _;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Wizard d'installation — proxy vers FastAPI ────────────────────────────
    # /setup/* et /setup/api/* sont servis par FastAPI (Jinja2), pas par React
    location /setup {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API REST — proxy vers FastAPI ─────────────────────────────────────────
    location /api {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # WebSocket support (pour les futures fonctionnalités temps réel)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Health check — proxy vers FastAPI ────────────────────────────────────
    location /health {
        proxy_pass       http://api:8000;
        proxy_set_header Host $host;
    }

    # ── Application React — SPA ───────────────────────────────────────────────
    # /  → proxié vers FastAPI en premier :
    #   • setup non terminé : middleware FastAPI redirige → /setup/dbb
    #   • setup terminé : FastAPI retourne 404 (pas de route /) → on sert React
    root /usr/share/nginx/html;
    index index.html;

    location / {
        proxy_pass              http://api:8000;
        proxy_intercept_errors  on;
        error_page 404          = @react_spa;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location @react_spa {
        try_files $uri /index.html;
    }

    # ── Assets statiques — cache long ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Sécurité ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}

server {
    listen 3000;
    server_name _;

    # ── Taille max des requêtes entrantes (upload logo, PDF…) ────────────────
    client_max_body_size 10m;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Wizard d'installation — proxy vers FastAPI ────────────────────────────
    # /setup/* et /setup/api/* sont servis par FastAPI (Jinja2), pas par React
    location /setup {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API REST — proxy vers FastAPI ─────────────────────────────────────────
    location /api {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # WebSocket support (pour les futures fonctionnalités temps réel)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Health check — proxy vers FastAPI ────────────────────────────────────
    location /health {
        proxy_pass       http://api:8000;
        proxy_set_header Host $host;
    }

    # ── Application React — SPA ───────────────────────────────────────────────
    # /setup/* et /api/* ont leurs propres blocs location ci-dessus.
    # Tout le reste est servi par la SPA React (index.html).
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Icônes PWA/iOS — cache court (iOS doit pouvoir re-télécharger) ──────
    location ~* (apple-touch-icon|icon-\d+|icon-maskable|favicon) {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Manifest PWA — cache court ─────────────────────────────────────────
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Assets statiques — cache long ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Sécurité ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}
